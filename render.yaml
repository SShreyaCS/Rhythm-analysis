# Render Blueprint — optional; you can mirror these settings in the dashboard.
services:
  - type: web
    name: rhythm-analysis-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python scripts/download_pose_model.py
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: MAX_VIDEO_DURATION_SEC
        value: "25"
      - key: POSE_SAMPLE_FPS
        value: "8"
      - key: MAX_POSE_SAMPLES
        value: "180"
      - key: ALLOWED_ORIGINS
        value: http://localhost:5173,http://127.0.0.1:5173,https://rhythm-analysis-frontend.onrender.com
